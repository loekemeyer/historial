<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial de Compras</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  padding:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:1200px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{margin:0 0 10px}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  background:#111827;
  color:white;
  padding:10px;
  font-size:14px;
}

td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

td.desc{text-align:left}

/* --- agregado mínimo para login (mantiene estética simple) --- */
.login{
  margin-top: 14px;
  padding: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  background: #fafafa;
}
.login-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:flex-end;
}
.login-col{
  flex: 1 1 220px;
  min-width: 220px;
}
label{ display:block; font-size:12px; color:#555; margin-bottom:6px; font-weight:bold; }
input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}
.btn{
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #ddd;
  background:white;
  font-weight:bold;
  cursor:pointer;
}
.btn.primary{
  background:#111827;
  color:white;
  border-color:#111827;
}
.small{
  font-size:12px;
  color:#666;
  margin-top:8px;
}
.right{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  align-items:center;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div class="card">
  <div class="right">
    <button id="btnLogout" class="btn" style="display:none" type="button">Cerrar sesión</button>
  </div>

  <h1>Historial de compras</h1>
  <div id="cliente"></div>

  <!-- LOGIN (solo se muestra si NO hay sesión) -->
  <div id="loginBox" class="login" style="display:none">
    <div class="login-row">
      <div class="login-col">
        <label for="user">CUIT o Email</label>
        <input id="user" type="text" placeholder="Ej: 30XXXXXXXXX o email@empresa.com" autocomplete="username">
      </div>
      <div class="login-col">
        <label for="pass">Contraseña</label>
        <input id="pass" type="password" placeholder="********" autocomplete="current-password">
      </div>
      <div class="login-col" style="flex:0 0 auto; min-width:auto">
        <button id="btnLogin" class="btn primary" type="button">Ingresar</button>
      </div>
    </div>
    <div class="small" id="loginMsg"></div>
  </div>

  <div id="status">Cargando...</div>

  <table id="tabla" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="historial.js"></script>

</body>
</html>
